---
- name: Configuring UFW Firewall
  hosts: "{{ env }}"
  become: yes

  tasks:
    - name: Ensure UFW is installed        
      ansible.builtin.package:          
        name: ufw                         
        state: present

    - name: Verify UFW installation
      ansible.builtin.command: ufw --version
      register: ufw_version
      changed_when: false

    - name: Show UFW version
      ansible.builtin.debug:
        msg: "UFW is installed: {{ ufw_version.stdout }}"

    - block:
        - name: Reset UFW to default
          community.general.ufw:
            state: reset
            comment: "Reset firewall to clean state"

        - name: Show SSH port from inventory
          ansible.builtin.debug:
            msg: "Using SSH port: {{ ansible_port }}"

        - name: Allow SSH first (prevent lockout)
          community.general.ufw:
            rule: allow
            to_port: "{{ ansible_port }}"
            proto: tcp
            comment: "Always allow SSH first"

        - name: Allow HTTP
          community.general.ufw:
            rule: allow
            to_port: 80
            proto: tcp
            comment: "Allow web traffic"

        - name: Allow HTTPS
          community.general.ufw:
            rule: allow
            to_port: 443
            proto: tcp
            comment: "Allow secure web traffic"

        - name: Deny all other incoming traffic
          community.general.ufw:
            rule: deny
            direction: in
            comment: "Deny all other incoming connections"

        - name: Enable UFW with logging
          community.general.ufw:
            state: enabled
            logging: "on"      

      rescue:         
        - name: Ensure SSH is still allowed on failure
          community.general.ufw:
            rule: allow
            to_port: "{{ ansible_port }}"
            proto: tcp