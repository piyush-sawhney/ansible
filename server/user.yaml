---
- name: User update and hardening tasks
  hosts: "{{ env }}"
  become: yes
  vars_files:
     - "{{ playbook_dir }}/../global_vars/{{ env }}.yaml"

  tasks:
    - name: "List of user accounts with empty password - UBUNTU 24.04 LTS"
      ansible.builtin.shell: "cat /etc/shadow | awk -F: '($2 == \"\") {j++; print $1} END {exit j}'"
      changed_when: false
      failed_when: pre_setup_username_no_password.rc not in [0, 1]
      register: pre_setup_username_no_password

    - name: Ubuntu 24.04 LTS - no user accounts should have empty passwords
      when: pre_setup_username_no_password.stdout | length > 0
      block:
        - name: Listing user accounts with empty password - UBUNTU 24.04 LTS
          ansible.builtin.debug:
            msg: "Warning!! The following accounts have blank passwords: {{ pre_setup_username_no_password.stdout_lines }}"

        - name: Lock accounts with empty password - UBUNTU 24.04 LTS
          ansible.builtin.user:
            name: "{{ item }}"
            password_lock: true
          loop: "{{ pre_setup_username_no_password.stdout_lines }}"

    - name: Get list of users in sudo group
      ansible.builtin.shell: "grep sudo /etc/group | awk -F: '{print $NF}'"
      changed_when: false
      failed_when: discovered_sudo_group_users.rc not in [0, 1]
      register: discovered_sudo_group_users

    - name: Create list of discovered sudo group users
      ansible.builtin.set_fact:
        discovered_sudo_group_users_list: "{{ discovered_sudo_group_users.stdout | split(',') }}"

    - name: Find non-required sudo group users
      ansible.builtin.set_fact:
        sudo_group_members_not_required: "{{ discovered_sudo_group_users_list | difference(sudo_allowed_users) }}"

    - name: Show non-required sudo group users
      ansible.builtin.debug:
        msg: "The following users {{ sudo_group_members_not_required }} have been found in the sudo group but are not in 'sudo_allowed_users'"

    - name: Make required members part of sudo group
      ansible.builtin.user:
        name: "{{ item }}"
        append: true
        groups: sudo
      loop: "{{ sudo_allowed_users }}"

    - name: Remove non-required members from sudo group
      when:
        - to_remove_sudo_users | default(false)
        - sudo_group_members_not_required | length > 0
      ansible.builtin.command: gpasswd -d "{{ item }}" sudo
      loop: "{{ sudo_group_members_not_required }}"