- name: Install and update Postiz
  hosts: "{{ env }}"
  become: yes
  vars_files:
    - "{{ playbook_dir }}/../global_vars/{{ env }}.yaml"
    - "vars/main.yaml"

  tasks:
    # ============================================================
    # PREPARATION
    # ============================================================
    - name: Checkout Postiz Git repository
      ansible.builtin.git:
        repo: "{{ postiz_repo_url }}"
        dest: "{{ compose_dest }}/postiz"
        version: main
        update: yes
        force: yes
      register: git_result
    
    - name: Ensure dynamicconfig directory exists
      ansible.builtin.file:
        path: "{{ compose_dest }}/postiz/dynamicconfig"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Render temporal dynamic config file
      ansible.builtin.template:
        src: templates/production-sql.yaml.j2
        dest: "{{ compose_dest }}/postiz/dynamicconfig/production-sql.yaml"
        owner: root
        group: root
        mode: '0644'
      register: config_result

    - name: Render Postiz .env file
      ansible.builtin.template:
        src: templates/postiz.env.j2
        dest: "{{ compose_dest }}/postiz/.env"
        owner: root
        group: root
        mode: '0600'
      register: env_result

    # ============================================================
    # DEPLOYMENT
    # ============================================================
    - name: Deploy Postiz stack
      community.docker.docker_compose_v2:
        project_src: "{{ compose_dest }}/postiz"
        files:
          - postiz-compose.yaml # Double check this filename
        build: never
        state: present
        # FIX: Recreate if Git, .env, OR the Dynamic Config changes
        recreate: "{{ 'always' if (git_result.changed or env_result.changed or config_result.changed) else 'auto' }}"
        env_files:
          - ".env"

    # ============================================================
    # VERIFICATION
    # ============================================================
    - name: Wait for Postiz to become healthy
      community.docker.docker_container_info:
        name: postiz
      register: postiz_info
      until: >
        postiz_info.container is defined and
        postiz_info.container.State.Health is defined and
        postiz_info.container.State.Health.Status == "healthy"
      retries: 30 # Increased retries (Postiz/Temporal migrations take time)
      delay: 10
      ignore_errors: yes 

    - name: Fail if Postiz is not healthy
      ansible.builtin.fail:
        msg: "Postiz container status: {{ postiz_info.container.State.Health.Status | default('Unknown') }}"
      when: >
        postiz_info.container is not defined or
        postiz_info.container.State.Health is not defined or
        postiz_info.container.State.Health.Status != "healthy"