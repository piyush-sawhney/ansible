- name: Install firewall bouncer
  hosts: "{{ env }}"
  become: yes
  vars_files:
    - "{{ playbook_dir }}/../global_vars/{{ env }}.yaml"
    - "{{ playbook_dir }}/../global_vars/secrets.yaml"
    - "vars/main.yaml"

  handlers:
    - name: Restart firewall bouncer
      listen: "Restart firewall bouncer"
      ansible.builtin.systemd:
        name: crowdsec-firewall-bouncer
        state: restarted

  tasks:
    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add CrowdSec GPG key
      ansible.builtin.get_url:
        url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
        dest: /etc/apt/keyrings/crowdsec.asc
        mode: '0644'

    - name: Add CrowdSec Repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/crowdsec.asc] https://packagecloud.io/crowdsec/crowdsec/any any main"
        state: present
        update_cache: yes
        
    - name: Ensure CrowdSec Firewall Bouncer (iptables) is installed
      ansible.builtin.apt:
        name: crowdsec-firewall-bouncer-iptables
        state: present

    - name: Set CrowdSec LAPI URL in bouncer config
      ansible.builtin.lineinfile:
        path: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
        regexp: '^api_url:'
        line: "api_url: {{ crowdsec_lapi_url }}"
      notify: Restart firewall bouncer

    - name: Set CrowdSec API key in bouncer config
      ansible.builtin.lineinfile:
        path: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
        regexp: '^api_key:'
        line: "api_key: {{ crowdsec_firewall_key }}"
      notify: Restart firewall bouncer

    - name: Ensure CrowdSec Firewall Bouncer service is enabled and started
      ansible.builtin.systemd:
        name: crowdsec-firewall-bouncer
        enabled: yes
        state: started
